<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Drawing Notebook</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="instructions">
        <p><b>Desktop:</b> Hold <b>SHIFT</b> to draw. Press <b>SPACE</b> to clear.</p>
        <p><b>Mobile:</b> Use the buttons below!</p>
        <p id="status">Loading camera...</p>
    </div>

    <div class="container">
        <video class="input_video" autoplay playsinline></video>
        <canvas class="output_canvas"></canvas>
        <canvas class="draw_canvas"></canvas>
    </div>

    <!-- Touch Buttons for Mobile & Desktop -->
    <div class="mobile-controls">
        <button id="drawToggleBtn" class="btn">Draw: OFF</button>
        <button id="clearBtn" class="btn">Clear</button>
        <button id="saveBtn" class="btn save-btn">Save 📸</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
